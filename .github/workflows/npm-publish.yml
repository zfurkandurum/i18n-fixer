name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get latest release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(gh release view --json tagName -q .tagName)
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG, version: $VERSION"

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          mkdir -p dist

          PLATFORMS=(
            "darwin_arm64"
            "darwin_amd64_v1"
            "linux_amd64_v1"
            "linux_arm64"
            "windows_amd64_v1"
            "windows_arm64"
          )

          for platform in "${PLATFORMS[@]}"; do
            if [[ "$platform" == windows_* ]]; then
              ARCHIVE="i18n-fixer_${VERSION}_${platform}.zip"
            else
              ARCHIVE="i18n-fixer_${VERSION}_${platform}.tar.gz"
            fi
            echo "Downloading $ARCHIVE..."
            gh release download "$TAG" -p "$ARCHIVE" -D dist/ || echo "Warning: $ARCHIVE not found, skipping"
          done

          # Extract archives
          cd dist
          for f in *.tar.gz; do [ -f "$f" ] && tar xzf "$f" && rm "$f"; done
          for f in *.zip; do [ -f "$f" ] && unzip -o "$f" && rm "$f"; done
          ls -la

      - name: Prepare npm packages
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          bash scripts/prepare-npm.sh "$VERSION" dist

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/i18n-fixer-*/; do
            if [ -d "$dir" ]; then
              echo "Publishing $dir..."
              cd "$dir" && npm publish --access public && cd ../..
            fi
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm/i18n-fixer && npm publish --access public
