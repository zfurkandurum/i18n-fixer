name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives Considered
